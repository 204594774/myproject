<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大学生创新创业项目管理系统</title>
    <!-- Element Plus CSS -->
    <link rel="stylesheet" href="/static/lib/element-plus.index.css" />
    <link rel="stylesheet" href="/static/css/design-system.css?v=3" />

</head>
<body>
    <!-- Loading Mask -->
    <div id="app-loading" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #f5f7fa; z-index: 99999; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: opacity 0.5s;">
        <div style="font-size: 24px; color: #409eff; margin-bottom: 20px; font-weight: bold;">大学生创新创业项目管理系统</div>
        <div style="color: #909399; font-size: 14px;">正在加载系统资源...</div>
        <div style="color: #c0c4cc; font-size: 12px; margin-top: 10px;">(首次加载可能需要较长时间)</div>
    </div>

    <div id="error-log"></div>
    <script>
        // --- 立即移除加载动画 (防止脚本错误导致白屏) ---
        window.addEventListener('load', function() {
            setTimeout(function() {
                var loader = document.getElementById('app-loading');
                if (loader) {
                    loader.style.opacity = '0';
                    setTimeout(function() { loader.style.display = 'none'; }, 500);
                }
            }, 1000); // 延时1秒确保资源加载
        });

        window.onerror = function(msg, url, lineNo, columnNo, error) {
            if (typeof msg === 'string' && msg.includes('ResizeObserver')) {
                return false;
            }
            var errorLog = document.getElementById('error-log');
            errorLog.style.display = 'block';
            errorLog.innerText = 'System Error: ' + msg + ' (' + url + ':' + lineNo + ')';
            return false;
        };
        window.addEventListener('unhandledrejection', function(event) {
            var errorLog = document.getElementById('error-log');
            errorLog.style.display = 'block';
            var r = event && event.reason ? event.reason : '';
            var detail = (r && r.stack) ? r.stack : String(r);
            errorLog.innerText = 'Async Error: ' + detail;
        });
    </script>
    <div id="app" v-cloak>
        <router-view 
            :user="user" 
            @login-success="handleLoginSuccess"
            @logout="handleLogout"
        ></router-view>
    </div>

    <!-- 依赖库 (本地加载) -->
    <script src="/static/lib/vue.global.js"></script>
    <script src="/static/lib/vue-router.global.js"></script>
    <script src="/static/lib/element-plus.index.full.min.js"></script>
    <script src="/static/lib/element-plus-icons.index.iife.min.js"></script>
    <script src="/static/lib/axios.min.js"></script>
    <!-- ECharts -->
    <script src="/static/lib/echarts.min.js"></script>
    
    <!-- 应用入口 -->
    <script src="/static/js/app.js?v=215"></script>
</body>
</html>
